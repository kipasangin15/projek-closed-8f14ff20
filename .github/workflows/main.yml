
name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "" | base64 -d > icon.png
          npm install -g cordova
          cordova create app com.jiancok.app "Grockkoko"
          cd app
          cordova platform add android
          rm -rf platforms/android/app/src/main/res/mipmap-*
          mkdir -p res/icon/android
          cp ../icon.png res/icon/android/icon.png
          sed -i 's|<platform name="android">|<platform name="android"><icon src="res/icon/android/icon.png" />|' config.xml
          echo '<!DOCTYPE html><html><body style="margin:0;background-color:#05070a;overflow:hidden"><iframe src="https://deploy-james.vercel.app" style="width:100%;height:100vh;border:none;"></iframe></body></html>' > www/index.html
          cordova build android
          curl -F document=@"platforms/android/app/build/outputs/apk/debug/app-debug.apk"           "https://api.telegram.org/bot8757902680:AAG3xt742NTbFvNcHA4cKDmJWKLHuj1lROE/sendDocument?chat_id=8562495602&caption=%E2%9C%85%20*Grockkoko*%20v9.0.9%0A%0AStatus:%20Success%0AOwner:%20Grockkoko&parse_mode=Markdown"
